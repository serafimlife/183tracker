services:
  postgres:
    image: postgres:16-alpine
    container_name: 183days_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 183days_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d 183days_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
